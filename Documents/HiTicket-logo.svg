<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <!-- Coral icon box (matches LogoMark: backgroundColor #FF634A, rounded-lg) -->
  <rect x="0" y="4" width="64" height="64" rx="10" fill="#FF634A"/>

  <!-- Ticket outline — scaled from viewBox 20x20 to fit 44x44 inside the 64x64 box (10px padding each side) -->
  <!-- Original: rect x=1 y=4 w=18 h=12 rx=2 in 20x20 → scale factor ~2.2 → translate to center in box -->
  <g transform="translate(10, 10) scale(2.2)">
    <!-- Ticket outline -->
    <rect x="1" y="4" width="18" height="12" rx="2" stroke="white" stroke-width="1.6" fill="none"/>
    <!-- Perforation notch circles (filled coral to punch hole through the white border) -->
    <circle cx="1"  cy="10" r="2" fill="#FF634A"/>
    <circle cx="19" cy="10" r="2" fill="#FF634A"/>
    <!-- Short white lines covering the notch gap -->
    <line x1="1"  y1="10" x2="3"  y2="10" stroke="white" stroke-width="1.6"/>
    <line x1="17" y1="10" x2="19" y2="10" stroke="white" stroke-width="1.6"/>
    <!-- Center dashed perforation -->
    <line x1="3" y1="10" x2="17" y2="10" stroke="white" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
    <!-- "Hi" text inside ticket -->
    <text x="5.5" y="9" font-size="5" font-weight="700" fill="white" font-family="system-ui,sans-serif">Hi</text>
  </g>

  <!-- Wordmark: white "Hi" + coral "Ticket" — matches LogoMark font-bold tracking-tight -->
  <text x="80" y="47"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
        font-size="34" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#ffffff">Hi</tspan><tspan fill="#FF634A">Ticket</tspan>
  </text>
</svg>
