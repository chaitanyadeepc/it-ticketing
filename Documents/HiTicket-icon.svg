<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark background for contrast (same as site dark bg) -->
  <rect width="200" height="200" rx="38" fill="#09090b"/>

  <!-- Coral icon box centered, large -->
  <rect x="24" y="24" width="152" height="152" rx="24" fill="#FF634A"/>

  <!-- Ticket scaled up: original viewBox 20x20, scale to ~6 to fill ~120px, centered at 100,100 -->
  <g transform="translate(100,100) scale(6) translate(-10,-10)">
    <!-- Ticket outline -->
    <rect x="1" y="4" width="18" height="12" rx="2" stroke="white" stroke-width="1.6" fill="none"/>
    <!-- Perforation notch circles -->
    <circle cx="1"  cy="10" r="2" fill="#FF634A"/>
    <circle cx="19" cy="10" r="2" fill="#FF634A"/>
    <!-- Short white lines -->
    <line x1="1"  y1="10" x2="3"  y2="10" stroke="white" stroke-width="1.6"/>
    <line x1="17" y1="10" x2="19" y2="10" stroke="white" stroke-width="1.6"/>
    <!-- Center dashed perforation -->
    <line x1="3" y1="10" x2="17" y2="10" stroke="white" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
    <!-- "Hi" text -->
    <text x="5.5" y="9" font-size="5" font-weight="700" fill="white" font-family="system-ui,sans-serif">Hi</text>
  </g>
</svg>
