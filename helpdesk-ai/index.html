<!DOCTYPE html>
<html lang="en" data-color-mode="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HiTicket — Smart IT Support, Instantly" />
    <title>HiTicket</title>
    <!-- Restore color-mode before first paint — prevents flash -->
    <script>
      (function(){
        var m = localStorage.getItem('color-mode');
        document.documentElement.setAttribute('data-color-mode', m === 'light' ? 'light' : 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
